; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3_board]
platform = https://github.com/platformio/platform-espressif32.git#3c076807e1f55b90799b50b946e76a0508e97778
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 981200
monitor_filters = esp32_exception_decoder
build_flags = 
	-DCORE_DEBUG_LEVEL=0
	-DBOARD_HAS_PSRAM=1
	-DCONFIG_SPIRAM_USE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=1
	-DLPF2_LOG_LEVEL=4
	-DCONFIG_ARDUHAL_LOG_COLORS=1
	-std=gnu++2a
	-Wformat
	-mfix-esp32-psram-cache-issue
build_unflags = -std=gnu++11

lib_deps = 
	; rbel12b/Lpf2@^2.0.5
	fastled/FastLED@^3.10.3
	sparkfun/SparkFun BNO08x Cortex Based IMU@^1.0.6
	h2zero/NimBLE-Arduino

lib_extra_dirs = 
	../Lpf2

board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
